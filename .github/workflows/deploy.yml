name: build-and-push-web

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: managant-deploy-web
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner (GHCR requires lowercase)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/managant-web:latest
            ghcr.io/${{ env.OWNER_LC }}/managant-web:${{ github.sha }}

      - name: Deploy (SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}

            # Require Docker Compose v2 plugin on the droplet.
            docker compose version >/dev/null 2>&1

            flock -w 120 /tmp/managant-deploy.lock bash -lc "docker compose -f docker-compose.prod.yml pull web && docker compose -f docker-compose.prod.yml up -d web"
